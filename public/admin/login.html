<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LSMG Admin Login</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      color: #F5F2ED;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: 8px;
      line-height: 1;
    }
    .logo .ls { color: #F5F2ED; }
    .logo .mg { color: #C8102E; }
    .restricted {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 4px;
      color: #707070;
      text-align: center;
      text-transform: uppercase;
      font-variant: small-caps;
      margin-bottom: 40px;
    }
    .error-box {
      background: rgba(200, 16, 46, 0.15);
      border: 1px solid rgba(200, 16, 46, 0.4);
      color: #C8102E;
      font-size: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }
    .error-box.visible { display: block; }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 10px;
      letter-spacing: 3px;
      color: #8f8f8f;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: #111;
      border: 1px solid #222;
      color: #F5F2ED;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-input:focus {
      border-color: #C8102E;
    }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: #C8102E;
      color: #F5F2ED;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.3s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .note {
      font-size: 10px;
      color: #555;
      text-align: center;
      margin-top: 24px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo"><span class="ls">LS</span><span class="mg">MG</span></div>
    <div class="restricted">Admin Access &mdash; Restricted</div>

    <div id="error-box" class="error-box"></div>

    <form onsubmit="event.preventDefault(); doLogin();">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@lastshotmediagroup.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-input" placeholder="Password" required autocomplete="current-password">
      </div>
      <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
    </form>

    <div class="note">Access restricted to @lastshotmediagroup.com and @lsmgholdings.com accounts only.</div>
  </div>

  <script>
    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('error-box');
      const btn = document.getElementById('submit-btn');

      errorBox.classList.remove('visible');
      errorBox.textContent = '';
      btn.disabled = true;
      btn.textContent = 'SIGNING IN...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = '/admin/index.html';
        } else {
          errorBox.textContent = data.error || 'Login failed.';
          errorBox.classList.add('visible');
        }
      } catch (err) {
        errorBox.textContent = 'Network error. Please try again.';
        errorBox.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'SIGN IN';
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (email && password) doLogin();
      }
    });
  </script>
</body>
</html>
